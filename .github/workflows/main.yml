name: ETF MACD Monitor

permissions:
  contents: write

on:
  schedule:
    # 13:30 盘中预警
    - cron: '30 5 * * 1-5'
    # 15:15 收盘确认
    - cron: '15 7 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      WXPUSHER_TOKEN: ${{ secrets.WXPUSHER_TOKEN }}
      WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
      IMGBB_KEY: ${{ secrets.IMGBB_KEY }}
      ETF_CODE: ${{ vars.ETF_CODE }}
      MACD_FAST_PERIOD: ${{ vars.MACD_FAST_PERIOD }}
      MACD_SLOW_PERIOD: ${{ vars.MACD_SLOW_PERIOD }}
      MACD_SIGNAL_PERIOD: ${{ vars.MACD_SIGNAL_PERIOD }}
      MA_PERIOD: ${{ vars.MA_PERIOD }}
      SELL_PROFIT_TARGET: ${{ vars.SELL_PROFIT_TARGET }}
      INITIAL_CAPITAL: ${{ vars.INITIAL_CAPITAL }}
      LOT_SIZE: ${{ vars.LOT_SIZE }}
      HISTORY_START_DATE: ${{ vars.HISTORY_START_DATE }}
      CHART_VIEW_START_DATE: ${{ vars.CHART_VIEW_START_DATE }}
      CHART_LAG_DAYS: ${{ vars.CHART_LAG_DAYS }}
      CHART_FETCH_START_DATE: ${{ vars.CHART_FETCH_START_DATE }}
      CHART_ANCHOR_HSTECH: ${{ vars.CHART_ANCHOR_HSTECH }}
      CHART_ANCHOR_RATIO: ${{ vars.CHART_ANCHOR_RATIO }}
      CHART_HSTECH_YLIM_TOP: ${{ vars.CHART_HSTECH_YLIM_TOP }}
      CHART_HSTECH_YLIM_BOTTOM: ${{ vars.CHART_HSTECH_YLIM_BOTTOM }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Show AkShare version
      run: |
        python -c "import akshare as ak; print(ak.__version__)"
        
    # --- 综合监控 (MACD + 250日线仓位) ---
    - name: Run Original Monitor
      run: |
        python monitor.py

    # --- 图表监控 (保留不变) ---
    - name: Run Chart Monitor
      run: |
        python chart_monitor.py
